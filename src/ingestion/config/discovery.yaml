# Cấu hình tìm kiếm thông minh

# 1. Cấu hình quét nguồn chính thống
discovery_settings:
  engine: "serper"
  max_results: 5
  # Ưu tiên thứ tự nguồn để xử lý trùng lặp sau này
  source_priority: ["tvpl", "congbao"]
  target_domains:
    - "thuvienphapluat.vn"
    - "congbao.chinhphu.vn"
  path_denylist:
    - "/hoi-dap-phap-luat/"
    - "/cong-dong-dan-luat/"
    - "/ma-so-thue/"
    - "/thu-tuc-phap-ly/"
    - "/tu-van-phap-luat/"
    - "/tin-tuc-phap-luat/"
    - "/phap-luat-vo-tao/"
    - "/phap-luat/"
    - "/bai-viet/"
    - "/tin-tuc/"
    - "/tags.html"
  # Allowlist: chỉ giữ URL có path bắt đầu bằng prefix này theo domain
  # Dùng làm filter chính; denylist là lớp phòng thủ thứ hai
  path_allowlist:
    thuvienphapluat.vn: ["/van-ban/"]
    congbao.chinhphu.vn: ["/van-ban/"]

# 2. Cấu hình vận hành (Bổ sung để GoogleSerperEngine có đạn mà dùng)
rate_limit:
  delay_between_queries_sec: 2     # Nhịp thở giữa các lần search để tránh bị ban
  rotate_keys_every_n_calls: 50    # Tự động đổi Key sau mỗi 50 lần gọi để dàn đều quota

# 3. Định nghĩa các "Thực thể Luật" cần theo dõi
target_laws:
  - name: "Bộ luật Dân sự"
    aliases: ["BLDS", "bộ luật dân sự 2015", "bộ luật dân sự", "luật dân sự", "bộ luật ds"]
    keywords: ["Bộ luật dân sự 2015", "Văn bản hợp nhất bộ luật dân sự"]
  - name: "Luật Doanh nghiệp"
    aliases: ["LDN", "luật doanh nghiệp 2020", "luật doanh nghiệp", "luật dn"]
    keywords: ["Luật doanh nghiệp 2020", "Văn bản hợp nhất luật doanh nghiệp"]
  - name: "Luật Trọng tài thương mại"
    aliases: ["LTTTM", "luật trọng tài thương mại 2010", "luật trọng tài thương mại", "luật tttm"]
    keywords: ["Luật trọng tài thương mại 2010", "Văn bản hợp nhất luật trọng tài thương mại"]

# 3b. Path denylist da duoc chuyen vao discovery_settings phia tren

# 4. Mẫu câu truy vấn (Đã khóa Domain để giảm nhiễu)
query_templates:
  - id: "search_latest_version"
    # Thêm toán tử OR site để chỉ lấy từ 2 nguồn này ngay từ Google
    template: "Toàn văn {law_name} mới nhất site:thuvienphapluat.vn OR site:congbao.chinhphu.vn"
    priority: 1
  
  - id: "search_amendments"
    template: "Văn bản hợp nhất {law_name} site:thuvienphapluat.vn"
    priority: 1

# 5. Cấu hình lưu trữ và Khử trùng (Chuẩn Enterprise)
storage:
  output_dir: "data/ingestion/discovery_results"
  filename_format: "discovered_{timestamp}.jsonl"
  deduplication:
    method: "url_only"
    scope: "global"

# 6. Cơ chế chạy tiếp (Resume)
resume_logic:
  skip_if_processed: true
  refresh_interval_days: 7 # Luật không đổi theo giờ, 1 tuần check 1 lần là đủ